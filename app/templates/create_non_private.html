<!doctype html>
<html lang="zh">
<head>
<meta charset="utf-8">
<title>创建{% if persona_type == 'public' %}公众人物{% else %}虚构角色{% endif %}人格</title>
<style>
  body { font-family: -apple-system, "PingFang SC", sans-serif; max-width: 720px; margin: 40px auto; padding: 0 20px; color: #222; }
  h1 { font-size: 22px; }
  .tag { display: inline-block; font-size: 11px; padding: 2px 8px; border-radius: 4px; background: #f0f4ff; color: #2c7be5; }
  label { display: block; margin-top: 18px; font-size: 13px; color: #555; }
  input[type=text], textarea { width: 100%; padding: 8px 10px; border: 1px solid #ddd; border-radius: 6px; font-size: 14px; box-sizing: border-box; font-family: inherit; }
  textarea { min-height: 80px; }
  .hint { font-size: 12px; color: #999; margin-top: 4px; }
  .err { background: #fff0f0; color: #c00; padding: 10px; border-radius: 6px; margin: 16px 0; font-size: 13px; }
  button { margin-top: 20px; padding: 10px 24px; border: 0; border-radius: 6px; background: #2c7be5; color: #fff; font-size: 14px; cursor: pointer; }
  .back { display: inline-block; margin-bottom: 16px; color: #888; text-decoration: none; font-size: 13px; }
  .notice { background: #fff8e7; border: 1px solid #f0d68a; padding: 10px 14px; border-radius: 6px; font-size: 12px; color: #7a5b00; margin-bottom: 16px; }
</style>
</head>
<body>
<a class="back" href="/admin/create">← 选择其他类型</a>
<h1>
  创建{% if persona_type == 'public' %}公众人物{% else %}虚构角色{% endif %}人格
  <span class="tag">{{ persona_type|upper }}</span>
</h1>

<div class="notice">
  ⚠️ 此类型不会包含「与你的私人关系」「共同记忆」等信息，AI 不会假装认识你。
  适合用作思维顾问或角色对话，而非情感陪伴。
</div>

{% if error %}<div class="err">{{ error }}</div>{% endif %}

<form method="post" action="/admin/create/non_private">
  <input type="hidden" name="persona_type" value="{{ persona_type }}">

  <label>代号 slug
    <input type="text" name="slug" value="{{ slug or '' }}" required>
  </label>

  <label>名称
    <input type="text" name="name" value="{{ name or '' }}" required>
  </label>

  <label>领域
    <input type="text" name="domain" value="{{ domain or '' }}"
      placeholder="{% if persona_type == 'public' %}例：产品设计 / 投资 / 创业{% else %}例：奇幻冒险 / 校园 / 推理{% endif %}">
  </label>

  <label>代表作 / 关键信息
    <textarea name="works" placeholder="{% if persona_type == 'public' %}代表作品、知名观点、关键事件{% else %}所属作品、关键设定、角色弧线{% endif %}">{{ works or '' }}</textarea>
  </label>

  <label>基本信息
    <textarea name="basic_info" placeholder="{% if persona_type == 'public' %}出生年份 / 国籍 / 任职机构{% else %}年龄 / 身份 / 主要能力设定{% endif %}">{{ basic_info or '' }}</textarea>
  </label>

  <label>性格画像
    <textarea name="personality" placeholder="主要性格特征">{{ personality or '' }}</textarea>
  </label>

  <label>公开语料（可选，强烈推荐）
    <textarea name="raw_text" placeholder="粘贴访谈 / 演讲 / 文章 / 台词原文。语料越多，AI 越像 ta 本人。">{{ raw_text or '' }}</textarea>
    <div class="hint">无语料时走 LEAN 模式，从基本信息和领域常识推演，质量会受限</div>
  </label>

  <button type="submit">生成人格</button>
</form>
</body>
</html>
