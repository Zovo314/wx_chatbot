{% extends "base.html" %}
{% block title %}创建人格 — 前任.skill{% endblock %}
{% block content %}
<h1 class="text-2xl font-bold text-gray-800 mb-6">创建新人格</h1>

{% if error %}
<div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-lg mb-6">{{ error }}</div>
{% endif %}

<form method="post" action="/admin/create" enctype="multipart/form-data" class="space-y-6">
  <div class="bg-white rounded-lg shadow-sm border p-6 space-y-5">
    <h2 class="font-semibold text-gray-700">基础信息</h2>

    <div>
      <label class="block text-sm font-medium text-gray-600 mb-1">代号 / Slug（必填，英文或拼音）</label>
      <input type="text" name="slug" value="{{ slug|default('') }}" required
        class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        placeholder="xiaoming">
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-600 mb-1">花名 / 显示名（必填）</label>
      <input type="text" name="name" value="{{ name|default('') }}" required
        class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        placeholder="小明">
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-600 mb-1">基本信息（可选）</label>
      <input type="text" name="basic_info" value="{{ basic_info|default('') }}"
        class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        placeholder="在一起两年 分手半年 互联网产品经理 上海">
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-600 mb-1">性格画像（可选）</label>
      <input type="text" name="personality" value="{{ personality|default('') }}"
        class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        placeholder="ENFP 双子座 话很多 永远在社交 但深夜会突然emo">
    </div>
  </div>

  <div class="bg-white rounded-lg shadow-sm border p-6 space-y-5">
    <h2 class="font-semibold text-gray-700">原材料（可选）</h2>

    <div>
      <label class="block text-sm font-medium text-gray-600 mb-1">上传聊天记录文件</label>
      <input type="file" name="chat_file" accept=".txt,.csv,.html,.json,.mht"
        class="w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-lg file:border-0 file:text-sm file:font-medium file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
      <p class="text-xs text-gray-400 mt-1">支持微信导出 txt/html/csv/json、QQ 导出 mht/txt</p>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-600 mb-1">口述 / 粘贴文本</label>
      <textarea name="raw_text" rows="6"
        class="w-full border rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 focus:border-blue-500"
        placeholder="ta的口头禅、吵架模式、约会常去的地方、让你印象深刻的事...">{{ raw_text|default('') }}</textarea>
    </div>
  </div>

  <div class="flex justify-end">
    <button type="submit"
      class="bg-blue-600 text-white px-6 py-2.5 rounded-lg text-sm font-medium hover:bg-blue-700 disabled:opacity-50"
      onclick="this.disabled=true;this.textContent='生成中...';this.form.submit();">
      生成人格
    </button>
  </div>
</form>
{% endblock %}
